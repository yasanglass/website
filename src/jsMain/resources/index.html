<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Yasan Glass</title>
    <link rel="shortcut icon" type="image/png" href="favicon.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="https://yasan.glass">
    <meta name="twitter:title" content="Yasan Glass">
    <meta name="twitter:description" content="Developer & Designer">
    <meta name="twitter:creator" content="@yasan">
    <meta name="twitter:image:src" content="https://yasan.glass/card.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            border: 0;
            box-sizing: border-box;
            font-family: "Rubik", sans-serif;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --layer-bg: #000;
                --layer-mid: #121212;
                --layer-fg: #1F1F1F;
                --text: #E0E0E0;
            }
        }

        @media (prefers-color-scheme: light) {
            :root {
                --layer-bg: #D8D8D8;
                --layer-mid: #EEEEEE;
                --layer-fg: #fff;
                --text: #212121;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script src="yasanglass-github-io.js"></script>
</body>

</html>
