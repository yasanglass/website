name: build

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    name: Build Kotlin/JS browser distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew jsBrowserDistribution
